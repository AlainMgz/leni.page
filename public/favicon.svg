<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#09090b"/>

  <!-- Shield body -->
  <path
    d="M16 4 L26 8 L26 17 C26 22.5 21.5 27 16 29 C10.5 27 6 22.5 6 17 L6 8 Z"
    fill="none"
    stroke="#00f5ff"
    stroke-width="1.5"
    stroke-linejoin="round"
  />

  <!-- Diagonal scan line cutting through the shield — the "signal" element -->
  <line
    x1="9" y1="22"
    x2="23" y2="10"
    stroke="#00f5ff"
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.45"
  />

  <!-- Lock shackle (top arc) -->
  <path
    d="M13 15 C13 12.8 19 12.8 19 15"
    fill="none"
    stroke="#00f5ff"
    stroke-width="1.5"
    stroke-linecap="round"
  />

  <!-- Lock body -->
  <rect x="12" y="15" width="8" height="6" rx="1.2" fill="#00f5ff" opacity="0.9"/>

  <!-- Keyhole -->
  <circle cx="16" cy="17.5" r="1.2" fill="#09090b"/>
  <rect x="15.4" y="18.5" width="1.2" height="1.5" rx="0.3" fill="#09090b"/>
</svg>
